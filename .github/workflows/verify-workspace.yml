name: Verify Workspace

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xz-utils
        run: sudo apt-get update && sudo apt-get install -y xz-utils

      - name: Bootstrap local toolchain
        run: ./scripts/bootstrap_local_toolchain.sh

      - name: Verify workspace
        run: ./scripts/verify_workspace.sh
